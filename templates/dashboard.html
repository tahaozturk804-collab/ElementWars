<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yönetim Paneli — ElementWars</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="ew-loading">
  <div class="loading-logo">EW</div>
  <div class="loading-text">ElementWars Yükleniyor</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>
<div id="toast-container"></div>

<div class="dash-layout">

  <!-- ── Icon Sidebar ── -->
  <aside class="dash-sidebar">
    <div class="dash-brand" style="cursor:pointer" onclick="setSection('overview')">EW</div>
    <nav class="dash-icons">
      <div class="dash-icon" id="icon-overview" onclick="setSection('overview')" title="Genel Bakış"><i class="fas fa-home"></i></div>
      <div class="dash-icon" id="icon-users"    onclick="setSection('users')"    title="Kullanıcılar"><i class="fas fa-users"></i></div>
      <div class="dash-icon" id="icon-store"    onclick="setSection('store')"    title="Mağaza"><i class="fas fa-store"></i></div>
      <div class="dash-icon" id="icon-support"  onclick="setSection('support')"  title="Destek"><i class="fas fa-headset"></i></div>
      <div class="dash-icon" id="icon-apps"     onclick="setSection('apps')"     title="Başvurular"><i class="fas fa-file-alt"></i></div>
    </nav>
    <div class="dash-icon-bottom">
      <div class="dash-icon" onclick="window.location.href='/'" title="Siteye Dön"><i class="fas fa-external-link-alt"></i></div>
      <div class="dash-icon" onclick="doLogout()" title="Çıkış"><i class="fas fa-sign-out-alt"></i></div>
    </div>
  </aside>

  <!-- ── Content Area ── -->
  <div class="dash-content-area subnav-open" id="dash-content-area">

    <!-- Sub Nav -->
    <aside class="dash-subnav" id="dash-subnav">
      <div class="dash-subnav-header">
        <span class="dash-subnav-title-heading" id="subnav-title">Genel Bakış</span>
        <button class="dash-subnav-close" onclick="toggleSubnav()"><i class="fas fa-chevron-left"></i></button>
      </div>
      <div class="dash-subnav-inner" id="subnav-inner"></div>
    </aside>

    <!-- Main -->
    <div class="dash-main">
      <div class="inner-topbar">
        <button class="dash-subnav-toggle" onclick="toggleSubnav()"><i class="fas fa-bars"></i></button>
        <div class="breadcrumb">
          <span style="cursor:pointer" onclick="setSection('overview')"><i class="fas fa-home"></i></span>
          <span class="sep">›</span>
          <span class="current" id="breadcrumb-text">Genel Bakış</span>
        </div>
        <div class="inner-topbar-right">
          <i class="fas fa-bell topbar-icon"></i>
          <span class="text-muted fs-13" id="dash-username">...</span>
        </div>
      </div>

      <div class="dash-body" id="dash-body">
        <div class="text-muted" style="padding:40px;text-align:center">
          <i class="fas fa-spinner fa-spin" style="font-size:24px;margin-bottom:12px;display:block"></i>
          Yükleniyor...
        </div>
      </div>

      <div class="admin-footer">
        <div class="footer-lang">🇹🇷 Türkçe</div>
        <div class="footer-brand">
          <span style="color:var(--accent);font-weight:800">Element</span><span style="color:var(--blue);font-weight:800">Wars</span>
          <span class="text-dim">v1.0.0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
/* ═══════════════════════════════════════════
   DASHBOARD — Tam çalışan versiyon
   ═══════════════════════════════════════════ */

// ── Subnav Toggle ─────────────────────────
let subnavOpen = true;
function toggleSubnav() {
  subnavOpen = !subnavOpen;
  document.getElementById('dash-content-area').classList.toggle('subnav-open', subnavOpen);
}

// ── Logout ────────────────────────────────
async function doLogout() {
  await api.post('/api/auth/logout', {});
  window.location.href = '/';
}

// ── Section routing ───────────────────────
const SECTION_TITLES = {
  overview: 'Genel Bakış',
  users: 'Kullanıcı Yönetimi',
  store: 'Mağaza',
  support: 'Destek',
  apps: 'Başvurular'
};

const SUBNAVS = {
  overview: [
    { label: 'Genel Bakış', icon: 'fa-home', fn: () => renderOverview() }
  ],
  users: [
    { label: 'Kullanıcılar',         icon: 'fa-users',      fn: () => renderUsers(),        group: 'KULLANICI YÖNETİMİ' },
    { label: 'Roller',               icon: 'fa-shield-alt', fn: () => renderRoles() },
    { label: 'Yetkililer',           icon: 'fa-user-tie',   fn: () => renderStaff() },
    { label: 'Engellenen Kullanıcılar', icon: 'fa-ban',     fn: () => renderBanned() },
    { label: 'Özel Alanlar',         icon: 'fa-sliders-h',  fn: () => renderCustomFields() },
    { label: 'Kullanıcıyı Engelle',  icon: 'fa-user-slash', fn: () => renderBanUser(),      group: 'İŞLEMLER' },
    { label: 'Kredi Gönder',         icon: 'fa-paper-plane',fn: () => renderSendCredit() }
  ],
  store: [
    { label: 'Ürünler',       icon: 'fa-box',          fn: () => renderProducts(),    group: 'MAĞAZA' },
    { label: 'Kategoriler',   icon: 'fa-th-large',     fn: () => renderCategories() },
    { label: 'Sunucular',     icon: 'fa-server',       fn: () => renderServers() },
    { label: 'Kuponlar',      icon: 'fa-ticket-alt',   fn: () => renderCoupons() },
    { label: 'Siparişler',    icon: 'fa-shopping-bag', fn: () => renderOrders() },
    { label: 'Ödemeler',      icon: 'fa-credit-card',  fn: () => renderPayments() },
    { label: 'Toplu İndirim', icon: 'fa-tags',         fn: () => renderBulkDiscount(), group: 'GELİŞMİŞ' }
  ],
  support: [
    { label: 'Talepler',      icon: 'fa-ticket-alt',   fn: () => renderTickets(),     group: 'DESTEK' },
    { label: 'Kategoriler',   icon: 'fa-th-large',     fn: () => renderEmpty('Destek Kategorileri') },
    { label: 'Hızlı Cevaplar',icon: 'fa-bolt',         fn: () => renderEmpty('Hızlı Cevaplar') },
    { label: 'Ayarlar',       icon: 'fa-cog',          fn: () => renderEmpty('Destek Ayarları') },
    { label: 'Makaleler',     icon: 'fa-file-alt',     fn: () => renderEmpty('Makaleler'),    group: 'YARDIM MERKEZİ' },
    { label: 'Konular',       icon: 'fa-th-large',     fn: () => renderEmpty('Konular') }
  ],
  apps: [
    { label: 'Başvuru Formları', icon: 'fa-file-alt',  fn: () => renderAppForms(),    group: 'BAŞVURULAR' },
    { label: 'Başvurular',       icon: 'fa-download',  fn: () => renderAppList() },
    { label: 'Özel Formlar',     icon: 'fa-file-code', fn: () => renderCustomForms(), group: 'ÖZEL FORMLAR' },
    { label: 'Yanıtlar',         icon: 'fa-inbox',     fn: () => renderAnswers() }
  ]
};

let currentSection = '';
let currentSubnavLabel = '';

function setSection(section) {
  currentSection = section;
  // icon active
  document.querySelectorAll('.dash-icon[id^="icon-"]').forEach(el => el.classList.remove('active'));
  const icon = document.getElementById('icon-' + section);
  if (icon) icon.classList.add('active');
  // subnav title
  document.getElementById('subnav-title').textContent = SECTION_TITLES[section] || '';
  // build subnav
  const items = SUBNAVS[section] || [];
  let html = '';
  items.forEach(item => {
    if (item.group) html += `<div class="dash-subnav-title">${item.group}</div>`;
    html += `<div class="dash-subnav-item" onclick="runSubnav('${item.label}')">`
          + `<i class="fas ${item.icon}"></i> ${item.label}</div>`;
  });
  document.getElementById('subnav-inner').innerHTML = html;
  // run first item
  if (items.length) runSubnav(items[0].label);
}

function runSubnav(label) {
  currentSubnavLabel = label;
  // active highlight
  document.querySelectorAll('.dash-subnav-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === label);
  });
  // breadcrumb
  document.getElementById('breadcrumb-text').textContent = label;
  // run fn
  const items = SUBNAVS[currentSection] || [];
  const item = items.find(i => i.label === label);
  if (item) item.fn();
}

// ── Helpers ───────────────────────────────
function setBody(html) {
  document.getElementById('dash-body').innerHTML = html;
}

function loading() {
  setBody('<div class="text-muted" style="padding:40px;text-align:center"><i class="fas fa-spinner fa-spin" style="font-size:20px;margin-bottom:8px;display:block"></i>Yükleniyor...</div>');
}

function renderEmpty(title) {
  setBody(`<div class="dash-ph"><h1 class="dash-page-title" style="margin-bottom:0">${title}</h1></div>
    <div class="empty-state"><div class="empty-icon" style="font-size:56px;opacity:0.35">😶</div>
    <h3>Henüz içerik yok</h3><p>Bu bölüm yakında aktif olacak.</p></div>`);
}

/* ═══════════════════════════════════════════
   OVERVIEW
   ═══════════════════════════════════════════ */
async function renderOverview() {
  loading();
  try {
    const [stats, orders, tickets] = await Promise.all([
      api.get('/api/admin/stats'),
      api.get('/api/admin/orders'),
      api.get('/api/admin/tickets')
    ]);
    const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    const now = new Date(); const cm = now.getMonth();
    const bars = months.map((_,i) =>
      orders.filter(o => { const d=new Date(o.created_at*1000); return d.getMonth()===i && d.getFullYear()===now.getFullYear(); })
            .reduce((s,o) => s+o.total, 0)
    );
    const maxB = Math.max(...bars, 1);
    setBody(`
      <h1 class="dash-page-title">Genel Bakış</h1>
      <div class="stats-4">
        <div class="stat-w"><div class="stat-w-top"><div class="stat-w-icon"><i class="fas fa-users"></i></div><div class="stat-w-label">Toplam Kullanıcı</div></div><div class="stat-w-value">${stats.total_users}</div><div class="stat-w-sub">Kayıtlı hesap</div></div>
        <div class="stat-w"><div class="stat-w-top"><div class="stat-w-icon green"><i class="fas fa-dollar-sign"></i></div><div class="stat-w-label">Bu Ayki Satış</div></div><div class="stat-w-value text-green">${fmt(stats.monthly_sales)} USD</div><div class="stat-w-sub">Son 30 gün</div></div>
        <div class="stat-w"><div class="stat-w-top"><div class="stat-w-icon red"><i class="fas fa-headset"></i></div><div class="stat-w-label">Açık Talepler</div></div><div class="stat-w-value text-red">${stats.open_tickets}</div><div class="stat-w-sub">Yanıt bekliyor</div></div>
        <div class="stat-w"><div class="stat-w-top"><div class="stat-w-icon brown"><i class="fas fa-box"></i></div><div class="stat-w-label">Toplam Ürün</div></div><div class="stat-w-value text-brown">${stats.total_products}</div><div class="stat-w-sub">Aktif ürünler</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title"><i class="fas fa-chart-bar text-blue" style="margin-right:8px"></i>Aylık Satışlar</div>
          <div class="flex gap-16">
            <div class="text-right"><div class="text-muted fs-11">Bu Ay</div><div class="fw-800 fs-16 text-blue">${fmt(stats.monthly_sales)} USD</div></div>
            <div class="text-right"><div class="text-muted fs-11">Bugün</div><div class="fw-800 fs-16 text-green">${fmt(stats.today_sales)} USD</div></div>
          </div>
        </div>
        <div class="chart-area">
          ${months.map((m,i) => `<div class="chart-col"><div class="chart-bar-wrap"><div class="chart-bar ${i===cm?'highlight':''}" style="height:${Math.max(3,(bars[i]/maxB)*160)}px" title="${m}: ${fmt(bars[i])} USD"></div></div><div class="chart-month">${m}</div></div>`).join('')}
        </div>
      </div>
      <div class="two-cols">
        <div class="chart-card" style="margin-bottom:0">
          <div class="chart-header"><div class="chart-title">Son Siparişler</div><span class="text-blue fs-12 fw-700 pointer" onclick="setSection('store')">Tümü →</span></div>
          <table class="data-table"><thead><tr><th>Kullanıcı</th><th>Tutar</th><th>Yöntem</th><th>Durum</th></tr></thead>
          <tbody>${orders.length ? orders.slice(0,6).map(o=>`<tr><td class="fw-700">${o.username}</td><td class="fw-700 text-blue">${fmt(o.total)} USD</td><td class="text-muted fs-13">${o.payment_method}</td><td><span class="badge badge-green">${o.status}</span></td></tr>`).join('') : '<tr><td colspan="4" class="text-muted" style="padding:16px;text-align:center">Sipariş yok</td></tr>'}</tbody>
          </table>
        </div>
        <div class="chart-card" style="margin-bottom:0">
          <div class="chart-header"><div class="chart-title">Son Talepler</div><span class="text-blue fs-12 fw-700 pointer" onclick="setSection('support')">Tümü →</span></div>
          <table class="data-table"><thead><tr><th>Başlık</th><th>Kullanıcı</th><th>Durum</th></tr></thead>
          <tbody>${tickets.length ? tickets.slice(0,6).map(t=>`<tr><td class="fw-700">${t.title}</td><td class="text-muted fs-13">${t.username}</td><td><span class="badge ${t.status==='Açık'?'badge-blue':'badge-green'}">${t.status}</span></td></tr>`).join('') : '<tr><td colspan="3" class="text-muted" style="padding:16px;text-align:center">Talep yok</td></tr>'}</tbody>
          </table>
        </div>
      </div>`);
  } catch(e) {
    setBody('<div class="text-muted" style="padding:40px;text-align:center">Veriler yüklenemedi. Lütfen sayfayı yenileyin.</div>');
  }
}

/* ═══════════════════════════════════════════
   USERS
   ═══════════════════════════════════════════ */
async function renderUsers() {
  loading();
  const users = await api.get('/api/admin/users');
  setBody(`
    <div class="dash-ph">
      <h1 class="dash-page-title" style="margin-bottom:0">Kullanıcılar</h1>
      <button class="btn btn-primary btn-sm" onclick="renderCreateUser()"><i class="fas fa-plus"></i> Yeni Ekle</button>
    </div>
    <div class="search-wrap">
      <label>Kullanıcılar için arama yap</label>
      <div class="search-input-wrap"><i class="fas fa-search"></i><input class="input search-input" id="user-search" type="text" placeholder="Ad, e-posta ara..."></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table">
        <thead><tr><th>ID</th><th>Kullanıcı</th><th>E-posta</th><th>Rol</th><th>Kredi</th><th>Tarih</th><th></th></tr></thead>
        <tbody id="users-tbody">
          ${users.map(u => `<tr>
            <td class="text-muted">#${u.id}</td>
            <td><div class="user-cell"><img src="https://mc-heads.net/avatar/${u.username}/32" class="user-avatar" onerror="this.src='https://mc-heads.net/avatar/Steve/32'"><div><div class="username">${u.username}</div><div class="usertag">@${u.username}</div></div></div></td>
            <td class="text-muted fs-13">${u.email}</td>
            <td>${u.is_admin ? '<span class="badge-admin">Admin</span>' : '<span class="badge badge-white">Üye</span>'}</td>
            <td class="fw-700 text-green">${fmt(u.credit)} Kredi</td>
            <td class="text-muted fs-13">${timeAgo(u.created_at)}</td>
            <td style="display:flex;gap:4px">
              <button class="btn btn-red btn-icon btn-sm" onclick="deleteUser(${u.id},'${u.username}')"><i class="fas fa-trash"></i></button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="pagination"><div class="page-btn">← Önceki</div><div class="page-btn active">1</div><div class="page-btn">Sonraki →</div></div>`);
  filterTable('user-search','users-tbody');
}

async function deleteUser(id, username) {
  if (!confirm(`"${username}" silinsin mi?`)) return;
  const res = await api.delete('/api/admin/users/'+id);
  if (res.success) { toast('Kullanıcı silindi','success'); renderUsers(); }
  else toast(res.error,'error');
}

function renderCreateUser() {
  document.getElementById('breadcrumb-text').textContent = 'Hesap Oluştur';
  setBody(`
    <div class="dash-ph">
      <h1 class="dash-page-title" style="margin-bottom:0">Hesap Oluştur</h1>
      <button class="btn btn-ghost btn-sm" onclick="runSubnav('Kullanıcılar')"><i class="fas fa-arrow-left"></i> Geri</button>
    </div>
    <div class="form-card">
      <div class="form-card-title"><i class="fas fa-user text-blue" style="margin-right:8px"></i>Hesap Bilgileri</div>
      <div class="field"><label>Kullanıcı Adı</label><input class="input" id="cu-un" placeholder="kullanici_adi"></div>
      <div class="field"><label>E-posta</label><input class="input" id="cu-em" type="email" placeholder="ornek@mail.com"></div>
      <div class="form-row">
        <div class="field"><label>Parola</label><input class="input" id="cu-pw" type="password"></div>
        <div class="field"><label>Parola (Onayla)</label><input class="input" id="cu-pw2" type="password"></div>
      </div>
      <div class="field"><label>Kredi</label><input class="input" id="cu-cr" type="number" value="0" step="0.01"></div>
      <label class="flex-center gap-8 mt-8 fs-13" style="cursor:pointer">
        <input type="checkbox" id="cu-adm" style="accent-color:var(--blue)"> Admin yetkisi ver
      </label>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="createUser()"><i class="fas fa-plus"></i> Oluştur</button>
    </div>`);
}

async function createUser() {
  const un=document.getElementById('cu-un').value.trim();
  const em=document.getElementById('cu-em').value.trim();
  const pw=document.getElementById('cu-pw').value;
  const pw2=document.getElementById('cu-pw2').value;
  const cr=parseFloat(document.getElementById('cu-cr').value)||0;
  const adm=document.getElementById('cu-adm').checked?1:0;
  if(!un||!em||!pw){toast('Tüm alanları doldurun','error');return;}
  if(pw!==pw2){toast('Şifreler eşleşmiyor','error');return;}
  const res=await api.post('/api/admin/users',{username:un,email:em,password:pw,credit:cr,is_admin:adm});
  if(res.success){toast('Kullanıcı oluşturuldu!','success');runSubnav('Kullanıcılar');}
  else toast(res.error,'error');
}

function renderRoles() {
  setBody(`
    <div class="dash-ph">
      <h1 class="dash-page-title" style="margin-bottom:0">Rol Oluştur</h1>
    </div>
    <div class="form-card">
      <div class="form-row">
        <div class="field"><label>Ad</label><input class="input" placeholder="ör. Moderatör"></div>
        <div class="field"><label>Öncelik</label><input class="input" type="number" value="0"></div>
      </div>
      <div class="field"><label>Kullanıcı Adı CSS</label><textarea class="input" rows="3" placeholder="color:#e03535;font-weight:bold;"></textarea></div>
      <div class="field"><label>Rozet CSS</label><textarea class="input" rows="3" placeholder="background:#e03535;color:#fff;"></textarea></div>
      <div class="toggle-wrap mt-16"><div class="toggle on" onclick="this.classList.toggle('on')"></div><span class="toggle-label">Yetkili rolü mü?</span></div>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="toast('Rol oluşturuldu!','success')"><i class="fas fa-save"></i> Oluştur</button>
    </div>`);
}

async function renderStaff() {
  loading();
  const users = await api.get('/api/admin/users');
  const staff = users.filter(u => u.is_admin);
  setBody(`
    <div class="dash-ph">
      <h1 class="dash-page-title" style="margin-bottom:0">Yetkililer</h1>
      <button class="btn btn-primary btn-sm" onclick="renderCreateUser()"><i class="fas fa-plus"></i> Yeni Ekle</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table">
        <thead><tr><th>ID</th><th>Kullanıcı</th><th>E-posta</th><th>Rol</th><th>Kredi</th><th>Tarih</th><th></th></tr></thead>
        <tbody>
          ${staff.length===0 ? '<tr><td colspan="7" class="text-muted" style="padding:24px;text-align:center">Yetkili bulunamadı</td></tr>' :
            staff.map(u=>`<tr>
              <td class="text-muted">#${u.id}</td>
              <td><div class="user-cell"><img src="https://mc-heads.net/avatar/${u.username}/32" class="user-avatar"><div><div class="username">${u.username}</div><div class="usertag">@${u.username}</div></div></div></td>
              <td class="text-muted fs-13">${u.email}</td>
              <td><span class="badge-admin">Admin</span></td>
              <td class="fw-700 text-green">${fmt(u.credit)} Kredi</td>
              <td class="text-muted fs-13">${timeAgo(u.created_at)}</td>
              <td><button class="btn btn-blue btn-icon btn-sm"><i class="fas fa-eye"></i></button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`);
}

function renderBanned() {
  setBody(`<div class="dash-ph"><h1 class="dash-page-title" style="margin-bottom:0">Engellenen Kullanıcılar</h1></div>
    <div class="empty-state"><div class="empty-icon" style="font-size:56px;opacity:0.35">🚫</div><h3>Engellenen kullanıcı yok</h3></div>`);
}

function renderCustomFields() {
  setBody(`<div class="dash-ph"><h1 class="dash-page-title" style="margin-bottom:0">Özel Alanlar</h1>
    <button class="btn btn-primary btn-sm" onclick="toast('Alan eklendi!','success')"><i class="fas fa-plus"></i> Yeni Alan</button></div>
    <div class="empty-state"><div class="empty-icon">🔧</div><h3>Özel alan bulunamadı</h3></div>`);
}

function renderBanUser() {
  setBody(`<div class="dash-ph"><h1 class="dash-page-title" style="margin-bottom:0">Kullanıcıyı Engelle</h1></div>
    <div class="form-card">
      <div class="field"><label>Kullanıcı Adı</label><input class="input" placeholder="Kullanıcı adı..."></div>

function addOrderRow() {
  const tbody = document.getElementById('order-items-body');
  if(!tbody) return;
  const row = document.createElement('tr');
  row.innerHTML = `
    <td><select class="input" style="margin:0;min-width:140px" onchange="updateOrderTotal()">
      <option value="">Ürün seç</option>
      ${_allProds.map(p=>`<option value="${p.price}">${p.image_emoji} ${p.name}</option>`).join('')}
    </select></td>
    <td><input class="input" type="number" value="1" min="1" style="margin:0;width:65px" oninput="updateOrderTotal()"></td>
    <td class="text-muted">0.00</td>
    <td class="fw-700 text-blue">0.00 USD</td>
    <td><button class="btn btn-red btn-icon btn-sm" onclick="this.closest('tr').remove();updateOrderTotal()"><i class="fas fa-trash"></i></button></td>`;
  tbody.appendChild(row);
}

function updateOrderTotal() {
  let total=0;
  document.querySelectorAll('#order-items-body tr').forEach(row=>{
    const sel=row.querySelector('select'), qty=row.querySelector('input[type=number]');
    if(!sel||!qty) return;
    total += (parseFloat(sel.value)||0)*(parseInt(qty.value)||1);
  });
  const el=document.getElementById('order-grand-total');
  if(el) el.textContent=total.toFixed(2)+' USD';
}

      <div><label>Destek Talepleri için arama yap</label>
        <div class="search-input-wrap"><i class="fas fa-search"></i><input class="input search-input" id="tkt-search" type="text" placeholder="Başlık, kullanıcı ara..."></div>
      </div>
      <div><label>Kategori</label><select class="input" style="height:46px"><option>Hepsini Göster</option></select></div>
      <div><label>Durum</label><select class="input" style="height:46px"><option>Hepsini Göster</option><option>Açık</option><option>Kapalı</option></select></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table">
        <thead><tr>
          <th><input type="checkbox" onchange="document.querySelectorAll('.tkt-cb').forEach(c=>c.checked=this.checked)"></th>
          <th>Başlık/ID</th><th>Kullanıcı</th><th>Kategori</th><th>Durum</th><th>Tarih</th><th></th>
        </tr></thead>
        <tbody id="tkt-tbody">
          ${tickets.length===0 ? '<tr><td colspan="7" class="text-muted" style="padding:24px;text-align:center">Talep bulunamadı</td></tr>' :
            tickets.map(t=>`<tr>
              <td><input type="checkbox" class="tkt-cb"></td>
              <td><div class="fw-700">${t.title}</div><div class="text-dim fs-11">#${t.id}</div></td>
              <td><div class="fw-700">${t.username}</div><div class="text-dim fs-11">@${t.username}</div></td>
              <td class="text-muted">${t.category}</td>
              <td><span class="badge ${t.status==='Açık'?'badge-blue':'badge-green'}">${t.status}</span></td>
              <td class="text-muted fs-13">${timeAgo(t.created_at)}</td>
              <td style="display:flex;gap:4px">
                <button class="btn btn-blue btn-icon btn-sm"><i class="fas fa-eye"></i></button>
                ${t.status==='Açık'?`<button class="btn btn-ghost btn-icon btn-sm" onclick="closeTicket(${t.id})"><i class="fas fa-times"></i></button>`:''}
                <button class="btn btn-red btn-icon btn-sm" onclick="deleteTicket(${t.id})"><i class="fas fa-trash"></i></button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="pagination"><div class="page-btn">← Önceki</div><div class="page-btn active">1</div><div class="page-btn">Sonraki →</div></div>`);
  filterTable('tkt-search','tkt-tbody');
}

async function closeTicket(id) {
  const res=await api.put('/api/admin/tickets/'+id+'/close',{});
  if(res.success){toast('Talep kapatıldı','success');renderTickets();}else toast(res.error||'Hata','error');
}
async function deleteTicket(id) {
  if(!confirm('Talep silinsin mi?')) return;
  const res=await api.delete('/api/support/tickets/'+id);
  if(res.success){toast('Talep silindi','success');renderTickets();}else toast(res.error||'Hata','error');
}

function addFormField() {
  const c=document.getElementById('af-fields');

  row.innerHTML=`<input class="input" placeholder="Alan adı" style="margin:0"><select class="input" style="margin:0"><option>Metin</option><option>Uzun Metin</option><option>Seçim</option><option>Sayı</option></select><button class="btn btn-red btn-icon" style="height:46px" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>`;
  c.appendChild(row);
}

      window.location.href = '/login';
      return;
    }
    document.getElementById('dash-username').textContent = me.username;
    hideLoader();
    setSection('overview');
  } catch(e) {
    window.location.href = '/login';
  }
})();
